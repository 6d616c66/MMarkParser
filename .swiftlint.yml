# MMarkParser SwiftLint Configuration

# Splash vendored library — not our code
excluded:
  - "**/Splash/**"

# C API constants from md4c + short vars in C interop and math/chem helpers
identifier_name:
  excluded:
    - MD_FLAG_TABLES
    - MD_FLAG_STRIKETHROUGH
    - MD_FLAG_PERMISSIVEURLAUTOLINKS
    - MD_FLAG_PERMISSIVEEMAILAUTOLINKS
    - MD_FLAG_PERMISSIVEWWWAUTOLINKS
    - MD_FLAG_PERMISSIVEAUTOLINKS
    - MD_FLAG_TASKLISTS
    - MD_FLAG_LATEXMATHSPANS
    - MD_FLAG_FOOTNOTES
    - MD_FLAG_HARD_SOFT_BREAKS
    - d
    - cb
    - i
    - r
    - s
    - c
    - _liStateStack
    - _tightListStack
    - _imgAltBuffer
    - _imgUrlBuffer

# md4c callback handler — switch statements are inherent to the SAX model
cyclomatic_complexity:
  ignores_case_statements: true
  warning: 30

# MMarkParserWrapper — large by design (all md4c callbacks in one handler)
function_body_length:
  warning: 120
  error: 500

file_length:
  warning: 800
  error: 2000
  excluded:
    - "**/MMarkParserWrapper.swift"

type_body_length:
  warning: 500
  error: 1500
